metadata:
  id: "compression.memory_merge_bundle"
  name: "Memory Merge Bundle"
  description: "Merge existing memory with new memory, return L0/L1/L2"
  version: "1.0.0"
  language: "zh"
  category: "compression"

variables:
  - name: "existing_abstract"
    type: "string"
    description: "Existing memory abstract (L0)"
    required: false
    default: ""
  - name: "existing_overview"
    type: "string"
    description: "Existing memory overview (L1)"
    required: false
    default: ""
  - name: "existing_content"
    type: "string"
    description: "Existing memory content (L2)"
    required: true
  - name: "new_abstract"
    type: "string"
    description: "New memory abstract (L0)"
    required: false
    default: ""
  - name: "new_overview"
    type: "string"
    description: "New memory overview (L1)"
    required: false
    default: ""
  - name: "new_content"
    type: "string"
    description: "New memory content (L2)"
    required: true
  - name: "category"
    type: "string"
    description: "Memory category"
    required: true
  - name: "output_language"
    type: "string"
    description: "Target output language"
    required: false
    default: "zh-CN"

template: |
  将一条已有记忆和一条新记忆合并。

  维度: {{ category }}
  输出语言: {{ output_language }}

  已有记忆:
  - 摘要 (L0): {{ existing_abstract }}
  - 概览 (L1): {{ existing_overview }}
  - 内容 (L2): {{ existing_content }}

  新记忆:
  - 摘要 (L0): {{ new_abstract }}
  - 概览 (L1): {{ new_overview }}
  - 内容 (L2): {{ new_content }}

  要求:
  - 合并为一条连贯的记忆。
  - 保留已有记忆中不冲突的细节。
  - 冲突的部分以新记忆为准。
  - 只返回 JSON。

  返回 JSON:
  {
    "decision": "merge",
    "abstract": "一句话 L0 摘要",
    "overview": "结构化 markdown L1 概览",
    "content": "完整合并后的 L2 内容",
    "reason": "简短原因"
  }

llm_config:
  temperature: 0.0
